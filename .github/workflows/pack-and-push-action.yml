name: Pack and Push Solution
run-name: Pack and Push Solution

# Disable husky install on restore
env:
  HUSKY: '0'

on:
  workflow_dispatch:

jobs:
  Pack-And-Push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # This is nescessary so it does not conflict with git-version
      
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Make local-packages folder
        shell: bash
        run: mkdir ./local-packages

        # Self publish our own cake tools to a local package feed so our build process will dog-food
      - name: Pack Pragmatic.CakeCI to local-packages
        shell: bash
        run: dotnet pack Pragmatic.CakeCI/Pragmatic.CakeCI.csproj --configuration Release --output ./local-packages --version 0.1.0-dogfood

      - name: Run cake step
        uses: cake-build/cake-action@763b621ef69b317c1d6bde43a65f189c936b503b
        with:
          script-path: build.cake
          target: FullPackAndPush
          NugetSource: ${{ vars.PRIVATE_NUGET_SOURCE }}
          NugetApiKey: ${{ secrets.GITHUB_TOKEN }}
          ContainerRegistry: ${{ secrets.PRIVATE_CONTAINER_REGISTRY }}
          ContainerRegistryToken: ${{ secrets.GITHUB_TOKEN }}
          ContainerRegistryUserName: ${{ vars.PRIVATE_CONTAINER_REGISTRY_USERNAME }}
          SonarOrg: ${{ vars.SONARORG }}
          SonarToken: ${{ secrets.SONARTOKEN }}
          SonarHostUrl: ${{ vars.SONARHOST }}
          SonarProjectKey: ${{ secrets.SONAR_PROJ_KEY }}
          SonarProjectName: ${{ vars.SONAR_PROJ_NAME }}
          SonarBranch: ${{ steps.extract_branch.outputs.branch }}

      - name: Publish Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: ./artifacts/